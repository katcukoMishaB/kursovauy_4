<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Краудсорсинговые проекты — университетская платформа</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
          colors: {
            ink: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a' },
            brand: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' }
          },
          boxShadow: {
            soft: '0 1px 2px rgba(15,23,42,0.04), 0 1px 1px rgba(15,23,42,0.03)',
            card: '0 4px 14px rgba(15,23,42,0.06), 0 2px 4px rgba(15,23,42,0.04)',
            pop:  '0 24px 48px -12px rgba(15,23,42,0.18), 0 8px 16px -8px rgba(15,23,42,0.10)'
          }
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/state.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/invitations.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .kanban-col { min-height: 60vh; }
    .boot-loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #f8fafc; color: #475569; font-size: 14px; }
  </style>
</head>
<body class="bg-ink-50 text-ink-800 antialiased">

  <div id="boot-loader" class="boot-loader">Загрузка интерфейса…</div>

  <div id="app-root" style="display:none;" x-data="app()" x-init="init()" x-cloak>

    <div x-show="toast.show" x-transition class="fixed top-5 right-5 z-50 px-4 py-2.5 rounded-lg shadow-pop text-sm font-medium"
         :class="{
          'bg-emerald-500 text-white': toast.type==='success',
          'bg-rose-500 text-white': toast.type==='error',
          'bg-ink-800 text-white': toast.type==='info'
         }">
      <span x-text="toast.text"></span>
    </div>

    <div x-show="!user">
      <div data-include="partials/auth.html"></div>
    </div>

    <div x-show="user" class="min-h-screen flex bg-ink-50">
      <div data-include="partials/sidebar-user.html"></div>
      <div data-include="partials/sidebar-admin.html"></div>
      <main class="flex-1 min-w-0 overflow-x-hidden">
        <div data-include="partials/page-projects.html"></div>
        <div data-include="partials/page-my-projects.html"></div>
        <div data-include="partials/page-project-detail.html"></div>
        <div data-include="partials/page-profile.html"></div>
        <div data-include="partials/page-chats.html"></div>
        <div data-include="partials/page-notifications.html"></div>
        <div data-include="partials/page-admin.html"></div>
      </main>
    </div>

    <div data-include="partials/modal-project.html"></div>
    <div data-include="partials/modal-task.html"></div>
    <div data-include="partials/modal-user.html"></div>
    <div data-include="partials/modal-task-detail.html"></div>
    <div data-include="partials/modal-invite.html"></div>
  </div>

  <script>
    (async function bootstrap() {
      try {
        const root = document.getElementById('app-root');
        const placeholders = Array.from(root.querySelectorAll('[data-include]'));
        await Promise.all(placeholders.map(async el => {
          const url = el.getAttribute('data-include');
          try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const html = await res.text();
            const wrapper = document.createElement('div');
            wrapper.innerHTML = html.trim();
            const frag = document.createDocumentFragment();
            while (wrapper.firstChild) frag.appendChild(wrapper.firstChild);
            el.replaceWith(frag);
          } catch (err) {
            console.error('Failed to load partial', url, err);
            const errDiv = document.createElement('div');
            errDiv.className = 'p-4 text-rose-600 text-sm';
            errDiv.textContent = 'Не удалось загрузить ' + url + ': ' + err.message;
            el.replaceWith(errDiv);
          }
        }));
      } catch (e) {
        console.error('bootstrap fail', e);
      } finally {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js';
        s.onload = () => {
          document.getElementById('app-root').style.display = '';
          const bl = document.getElementById('boot-loader');
          if (bl) bl.remove();
        };
        document.head.appendChild(s);
      }
    })();
  </script>

</body>
</html>
