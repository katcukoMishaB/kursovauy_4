        <section x-show="page==='projects'" x-cloak class="px-6 py-5">
          <div x-show="recommended.length" class="mb-7">
            <div class="flex items-center justify-between mb-3">
              <div>
                <h2 class="text-base font-semibold text-ink-900">Рекомендуем вам</h2>
                <p class="text-xs text-ink-500 mt-0.5">Подобраны по вашим интересам и навыкам</p>
              </div>
              <a class="text-xs text-brand-600 hover:underline cursor-pointer" @click.prevent="go('profile'); loadProfile()">Настроить интересы →</a>
            </div>
            <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-thin">
              <template x-for="p in recommended" :key="p.id">
                <div class="bg-gradient-to-br from-brand-50 to-white border border-brand-200 rounded-xl p-4 min-w-[280px] max-w-[280px] cursor-pointer hover:shadow-card transition" @click="openProject(p.id)">
                  <div class="flex items-start justify-between gap-2">
                    <h3 class="font-semibold text-ink-900 line-clamp-1" x-text="p.title"></h3>
                    <span x-show="p.score" class="text-[10px] px-1.5 py-0.5 bg-brand-600 text-white rounded font-bold" x-text="'+' + p.score"></span>
                  </div>
                  <p class="text-xs text-ink-600 line-clamp-2 mt-1" x-text="p.short_description"></p>
                  <div class="mt-2 flex flex-wrap gap-1">
                    <template x-for="r in (p.matched_reasons || [])"><span class="text-[10px] px-1.5 py-0.5 bg-white text-brand-700 border border-brand-200 rounded" x-text="r"></span></template>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <div class="flex flex-wrap items-center gap-3 mb-4">
            <div>
              <h1 class="text-2xl font-semibold text-ink-900 tracking-tight">Проекты</h1>
              <p class="text-sm text-ink-500 mt-1">Каталог открытых краудсорсинговых проектов</p>
            </div>
            <button x-show="role==='organizer' || role==='admin'" @click="openCreateProject()" class="ml-auto bg-brand-600 hover:bg-brand-700 text-white text-sm px-4 py-2 rounded-lg font-medium shadow-soft">+ Новый проект</button>
          </div>

          <div class="bg-white border border-ink-200 rounded-xl p-3 mb-5 shadow-soft flex flex-wrap items-center gap-2">
            <div class="relative flex-1 min-w-[200px] max-w-md">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-ink-400 text-sm pointer-events-none">⌕</span>
              <input x-model="projectSearch" placeholder="Поиск по названию, описанию, темам..." class="w-full pl-8 pr-3 py-2 border border-ink-200 rounded-lg text-sm focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500">
            </div>
            <div class="flex items-center gap-1 text-[11px] uppercase tracking-wide text-ink-500 ml-1">Статус:</div>
            <div class="flex flex-wrap gap-1">
              <template x-for="opt in [{v:'',l:'Все'},{v:'активен',l:'Активные'},{v:'завершён',l:'Завершённые'},{v:'архивирован',l:'Архив'}]">
                <button @click="projectFilter = opt.v; loadProjects()" class="text-[12px] px-3 py-1.5 rounded-full border transition"
                        :class="projectFilter === opt.v ? 'bg-brand-600 text-white border-brand-600' : 'bg-white text-ink-600 border-ink-200 hover:border-brand-400'" x-text="opt.l"></button>
              </template>
            </div>
            <div class="flex items-center gap-1 text-[11px] uppercase tracking-wide text-ink-500 ml-3">Категории:</div>
            <select x-model="projectCategoryFilter" class="px-3 py-1.5 border border-ink-200 rounded-lg text-sm focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500">
              <option value="">Все</option>
              <template x-for="c in categories" :key="c.id"><option :value="c.id" x-text="c.name"></option></template>
            </select>
            <div class="flex items-center gap-1 text-[11px] uppercase tracking-wide text-ink-500 ml-3">Сортировка:</div>
            <select x-model="projectSort" class="px-3 py-1.5 border border-ink-200 rounded-lg text-sm focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500">
              <option value="new">Сначала новые</option>
              <option value="old">Сначала старые</option>
              <option value="popular">По популярности</option>
              <option value="deadline">По дедлайну</option>
              <option value="title">По алфавиту</option>
            </select>
            <button x-show="projectSearch || projectFilter || projectCategoryFilter || projectSort !== 'new'"
                    @click="projectSearch=''; projectFilter=''; projectCategoryFilter=''; projectSort='new'; loadProjects()"
                    class="text-xs px-3 py-1.5 text-ink-500 hover:bg-ink-100 rounded-lg">Сбросить</button>
            <span class="ml-auto text-xs text-ink-500">Найдено: <span class="font-semibold text-ink-800" x-text="filteredProjects().length"></span></span>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
            <template x-for="p in filteredProjects()" :key="p.id">
              <div class="bg-white border border-ink-200 rounded-lg overflow-hidden hover:shadow-card hover:border-brand-200 transition cursor-pointer flex flex-col group" @click="openProject(p.id)">
                <div class="aspect-[16/9] bg-gradient-to-br from-brand-100 via-brand-50 to-white flex items-center justify-center text-center text-ink-700 relative overflow-hidden">
                  <img x-show="p.image_url" :src="p.image_url" class="absolute inset-0 w-full h-full object-cover" alt="">
                  <div x-show="!p.image_url" class="px-3 text-base font-semibold leading-tight" x-text="p.title"></div>
                </div>
                <div class="p-3 flex-1 flex flex-col">
                  <div class="flex items-start justify-between gap-2">
                    <h3 class="font-semibold text-ink-900 text-[14px] leading-snug line-clamp-2 group-hover:text-brand-700 transition" x-text="p.title"></h3>
                    <span class="text-[10px] px-1.5 py-0.5 rounded font-medium shrink-0" :class="statusColor(p.status)" x-text="p.status"></span>
                  </div>
                  <p class="text-[12px] text-ink-600 mt-1 line-clamp-2 flex-1" x-text="p.short_description"></p>
                  <div class="mt-2 flex flex-wrap gap-1" x-show="p.tags && p.tags.length">
                    <template x-for="t in (p.tags || []).slice(0,4)"><span class="text-[10px] px-1.5 py-0.5 bg-brand-50 text-brand-700 rounded font-medium" x-text="t"></span></template>
                  </div>
                  <div class="mt-2 pt-2 border-t border-ink-100 flex items-center justify-between text-[11px] text-ink-500">
                    <div class="flex items-center gap-1.5 min-w-0">
                      <div class="w-5 h-5 rounded-full bg-ink-200 flex items-center justify-center text-[9px] font-semibold text-ink-600 shrink-0" x-text="(p.organizer_name||'?')[0]?.toUpperCase()"></div>
                      <span class="truncate text-ink-500"><span x-text="p.organizer_name"></span></span>
                    </div>
                    <span class="flex items-center gap-1 shrink-0"><span>👥</span><span x-text="p.participants_count || 0"></span></span>
                  </div>
                </div>
              </div>
            </template>
            <p x-show="!filteredProjects().length" class="col-span-full text-center text-ink-400 py-12">Проекты не найдены</p>
          </div>
        </section>
