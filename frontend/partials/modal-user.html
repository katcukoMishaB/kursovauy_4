  <div x-show="showUserForm" x-cloak class="fixed inset-0 bg-ink-900/50 z-40 flex items-center justify-center p-4 backdrop-blur-sm" @click.self="showUserForm=false">
    <div class="bg-white rounded-xl w-full max-w-lg shadow-pop">
      <div class="px-6 py-4 border-b border-ink-200">
        <h3 class="text-lg font-semibold text-ink-900" x-text="userDraft.id ? 'Редактирование пользователя' : 'Новый пользователь'"></h3>
      </div>
      <form @submit.prevent="saveUser()" class="p-6 space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-sm font-medium text-ink-700">Имя</label><input x-model="userDraft.first_name" required class="mt-1 w-full px-3 py-2 border border-ink-200 rounded-lg text-sm"></div>
          <div><label class="text-sm font-medium text-ink-700">Фамилия</label><input x-model="userDraft.last_name" required class="mt-1 w-full px-3 py-2 border border-ink-200 rounded-lg text-sm"></div>
        </div>
        <div><label class="text-sm font-medium text-ink-700">Email</label><input type="email" x-model="userDraft.email" required class="mt-1 w-full px-3 py-2 border border-ink-200 rounded-lg text-sm"></div>
        <div>
          <label class="text-sm font-medium text-ink-700" x-text="userDraft.id ? 'Новый пароль (если нужно сменить)' : 'Пароль'"></label>
          <input type="password" x-model="userDraft.password" :required="!userDraft.id" class="mt-1 w-full px-3 py-2 border border-ink-200 rounded-lg text-sm">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-sm font-medium text-ink-700">Тип пользователя</label>
            <select x-model="userDraft.user_type" class="mt-1 w-full px-3 py-2 border border-ink-200 rounded-lg text-sm">
              <option value="student">Студент</option>
              <option value="teacher">Преподаватель</option>
              <option value="staff">Сотрудник</option>
            </select>
            <p class="text-[11px] text-ink-500 mt-1">Преподаватель автоматически получает права организатора.</p>
          </div>
          <div>
            <label class="text-sm font-medium text-ink-700">Учебная группа</label>
            <select x-model="userDraft.group_id" class="mt-1 w-full px-3 py-2 border border-ink-200 rounded-lg text-sm">
              <option value="">—</option>
              <template x-for="g in groups" :key="g.id">
                <option :value="g.id" x-text="g.name"></option>
              </template>
            </select>
          </div>
        </div>
        <div>
          <label class="text-sm font-medium text-ink-700">Роли</label>
          <div class="mt-1 flex flex-wrap gap-3">
            <label class="flex items-center gap-2 text-sm"><input type="checkbox" x-model="userDraft.is_participant" class="w-4 h-4 accent-brand-600"> Участник</label>
            <label class="flex items-center gap-2 text-sm"><input type="checkbox" x-model="userDraft.is_organizer" class="w-4 h-4 accent-brand-600"> Организатор</label>
            <label class="flex items-center gap-2 text-sm"><input type="checkbox" x-model="userDraft.is_admin" class="w-4 h-4 accent-rose-500"> Администратор</label>
          </div>
        </div>
        <div x-show="userDraft.id">
          <label class="flex items-center gap-2 text-sm"><input type="checkbox" x-model="userDraft.status" class="w-4 h-4 accent-emerald-500"> Активен (не заблокирован)</label>
        </div>
        <div class="flex gap-2 pt-2">
          <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white text-sm px-5 py-2 rounded-lg font-medium">Сохранить</button>
          <button type="button" @click="showUserForm=false" class="text-sm px-5 py-2 text-ink-600 hover:bg-ink-100 rounded-lg">Отмена</button>
        </div>
      </form>
    </div>
