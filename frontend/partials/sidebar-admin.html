      <aside x-show="role === 'admin'" class="w-60 shrink-0 bg-ink-900 text-ink-100 flex flex-col h-screen sticky top-0">
        <div class="px-4 py-3 border-b border-white/10 flex items-center gap-2">
          <div class="w-7 h-7 rounded-md bg-rose-500 text-white flex items-center justify-center font-bold text-xs">А</div>
          <div>
            <div class="font-semibold tracking-tight text-sm">Админ-консоль</div>
            <div class="text-[10px] text-ink-400 uppercase tracking-wider">Краудсорсинг</div>
          </div>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-0.5 text-sm">
          <button @click="setAdminTab('dashboard')" class="w-full flex items-center gap-3 px-3 py-2 rounded-md transition" :class="adminTab==='dashboard' ? 'bg-white/10 text-white font-medium' : 'text-ink-300 hover:bg-white/5'">
            <span class="text-base">📊</span><span>Дашборд</span>
          </button>
          <button @click="setAdminTab('users')" class="w-full flex items-center gap-3 px-3 py-2 rounded-md transition" :class="adminTab==='users' ? 'bg-white/10 text-white font-medium' : 'text-ink-300 hover:bg-white/5'">
            <span class="text-base">👥</span><span>Пользователи</span>
          </button>
          <button @click="setAdminTab('projects')" class="w-full flex items-center gap-3 px-3 py-2 rounded-md transition" :class="adminTab==='projects' ? 'bg-white/10 text-white font-medium' : 'text-ink-300 hover:bg-white/5'">
            <span class="text-base">🗂️</span><span>Проекты</span>
          </button>
          <button @click="setAdminTab('requests')" class="w-full flex items-center gap-3 px-3 py-2 rounded-md transition" :class="adminTab==='requests' ? 'bg-white/10 text-white font-medium' : 'text-ink-300 hover:bg-white/5'">
            <span class="text-base">📨</span><span>Заявки</span>
            <span x-show="dashboard?.pending_requests" class="ml-auto text-[10px] px-1.5 py-0.5 rounded-full bg-rose-500 text-white font-bold" x-text="dashboard?.pending_requests"></span>
          </button>
          <button @click="setAdminTab('reports')" class="w-full flex items-center gap-3 px-3 py-2 rounded-md transition" :class="adminTab==='reports' ? 'bg-white/10 text-white font-medium' : 'text-ink-300 hover:bg-white/5'">
            <span class="text-base">📈</span><span>Отчёты</span>
          </button>
          <button @click="setAdminTab('dictionaries')" class="w-full flex items-center gap-3 px-3 py-2 rounded-md transition" :class="adminTab==='dictionaries' ? 'bg-white/10 text-white font-medium' : 'text-ink-300 hover:bg-white/5'">
            <span class="text-base">📚</span><span>Справочники</span>
          </button>
        </nav>
        <div class="border-t border-white/10 p-3">
          <div class="flex items-center gap-3 px-2 py-2">
            <div class="w-8 h-8 rounded-full bg-rose-500 text-white flex items-center justify-center text-sm font-semibold shrink-0" x-text="(user.first_name || '?')[0]?.toUpperCase()"></div>
            <div class="text-left min-w-0 flex-1">
              <div class="text-sm font-medium truncate" x-text="(user.first_name||'') + ' ' + (user.last_name||'')"></div>
              <div class="text-xs text-ink-400">Администратор</div>
            </div>
          </div>
          <button @click="logout()" class="w-full mt-1 px-2 py-1.5 text-xs text-ink-400 hover:text-rose-400">Выйти</button>
        </div>
      </aside>
