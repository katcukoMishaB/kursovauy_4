services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: crowdsourcing
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crowdsourcing_pass}
      POSTGRES_DB: crowdsourcing_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crowdsourcing -d crowdsourcing_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: crowdsourcing
      DB_PASSWORD: ${DB_PASSWORD:-crowdsourcing_pass}
      DB_NAME: crowdsourcing_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 8001
    depends_on:
      postgres:
        condition: service_healthy

  project-service:
    build:
      context: .
      dockerfile: services/project-service/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: crowdsourcing
      DB_PASSWORD: ${DB_PASSWORD:-crowdsourcing_pass}
      DB_NAME: crowdsourcing_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 8002
    depends_on:
      postgres:
        condition: service_healthy

  task-service:
    build:
      context: .
      dockerfile: services/task-service/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: crowdsourcing
      DB_PASSWORD: ${DB_PASSWORD:-crowdsourcing_pass}
      DB_NAME: crowdsourcing_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 8003
    depends_on:
      postgres:
        condition: service_healthy

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: crowdsourcing
      DB_PASSWORD: ${DB_PASSWORD:-crowdsourcing_pass}
      DB_NAME: crowdsourcing_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 8004
    depends_on:
      postgres:
        condition: service_healthy

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: crowdsourcing
      DB_PASSWORD: ${DB_PASSWORD:-crowdsourcing_pass}
      DB_NAME: crowdsourcing_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 8005
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8001
      PROJECT_SERVICE_URL: http://project-service:8002
      TASK_SERVICE_URL: http://task-service:8003
      CHAT_SERVICE_URL: http://chat-service:8004
      REPORT_SERVICE_URL: http://report-service:8005
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      UPLOADS_DIR: /data/uploads
      PORT: 8080
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      - user-service
      - project-service
      - task-service
      - chat-service
      - report-service

  seed:
    build:
      context: .
      dockerfile: scripts/seed/Dockerfile
    restart: "no"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: crowdsourcing
      DB_PASSWORD: ${DB_PASSWORD:-crowdsourcing_pass}
      DB_NAME: crowdsourcing_db
      SEED_FORCE: ${SEED_FORCE:-false}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
